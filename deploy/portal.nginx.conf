# Reverse proxy for the TriApply Portal itself (the public application form +
# the /slack/interactions callback Slack POSTs to). Terminates TLS and forwards
# to the jar listening on 127.0.0.1:PORT.
#
# This is the portal app — distinct from files-triangle-org.nginx.conf, which
# serves the uploaded résumés and is Authentik-gated. Do not add auth here: the
# application form and Slack callback must be publicly reachable.
#
# TLS: easiest is `certbot --nginx -d apply.example.com`, which fills in the
# ssl_certificate lines and the :80 redirect for you.

server {
    listen 80;
    server_name apply.example.com;          # <-- your portal subdomain
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name apply.example.com;          # <-- your portal subdomain

    ssl_certificate     /etc/letsencrypt/live/apply.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apply.example.com/privkey.pem;

    # Must exceed the portal's 10 MB per-file upload cap plus form overhead.
    client_max_body_size 12m;

    location / {
        proxy_pass         http://127.0.0.1:4321;   # <-- match PORT
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
