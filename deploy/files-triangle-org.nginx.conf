# files.triangle.org — serves applicant uploads from TRIAPPLY_UPLOAD_DIR,
# gated by Authentik via forward-auth (single-application mode).
#
# The triapply-portal writes files to the same directory and records
# https://files.triangle.org/<submissionId>/<file> URLs into the Sheet/Slack.
# This proxy is the only thing that enforces auth — the portal does none.
#
# Access policy: any user who can authenticate through Authentik. Tighten later
# by binding a group policy to the Application in Authentik (no nginx change).
#
# Prerequisites (Authentik admin):
#   1. Create a Proxy Provider:
#        - Authorization flow: default-provider-authorization-implicit-consent
#        - Mode: "Forward auth (single application)"
#        - External host: https://files.triangle.org
#   2. Create an Application bound to that provider (leave policy bindings empty
#      to allow any authenticated user).
#   3. Add the provider to the embedded outpost (Outposts → authentik Embedded
#      Outpost → edit → select the application).
#
# Replace AUTHENTIK_HOST below with the outpost's reachable address on your
# network (e.g. http://authentik-server:9000 in Docker, or the LAN host:port).

upstream authentik {
    server AUTHENTIK_HOST;      # e.g. authentik-server:9000
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name files.triangle.org;

    # TLS is managed by your existing cert tooling (certbot/Traefik/etc.).
    ssl_certificate     /etc/ssl/triangle/files.triangle.org.crt;
    ssl_certificate_key /etc/ssl/triangle/files.triangle.org.key;

    # Résumés are not huge, but allow room and stream them.
    client_max_body_size 1m;

    # ---- Authentik embedded outpost endpoints -----------------------------
    location /outpost.goauthentik.io {
        proxy_pass              http://authentik/outpost.goauthentik.io;
        proxy_set_header        Host $host;
        proxy_set_header        X-Original-URL $scheme://$http_host$request_uri;
        add_header              Set-Cookie $auth_cookie;
        auth_request_set        $auth_cookie $upstream_http_set_cookie;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
    }

    # ---- Protected static files -------------------------------------------
    location / {
        # Forward-auth: every request is verified against the outpost first.
        auth_request        /outpost.goauthentik.io/auth/nginx;
        error_page 401      = @goauthentik_signin;

        # Propagate the refreshed session cookie back to the browser.
        auth_request_set    $auth_cookie $upstream_http_set_cookie;
        add_header          Set-Cookie $auth_cookie;

        # Serve the uploads directory (must match TRIAPPLY_UPLOAD_DIR and be
        # readable by nginx). Only exact file hits; no directory listing.
        root                /var/lib/triapply/uploads;
        try_files           $uri =404;
        autoindex           off;
    }

    # Unauthenticated requests are bounced to Authentik and returned here.
    location @goauthentik_signin {
        internal;
        add_header  Set-Cookie $auth_cookie;
        return 302  /outpost.goauthentik.io/start?rd=$request_uri;
    }
}
